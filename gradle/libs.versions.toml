[versions]
kotlin = "2.1.21"
junit = "5.11.4"
flyway = "9.22.3"
flyway-boot2 = "8.5.13"
flyway-boot3 = "11.7.2"
postgresql = "42.7.4"
mysql = "8.0.33"
kingbase = "8.6.1"
jackson = "2.17.3"
jackson-kotlin = "2.21.4"
spring-boot2 = "2.7.18"
spring-boot3 = "3.5.16"
assertj = "3.26.3"
aws-sdk = "2.47.4"
micrometer = "1.10.13"
opentelemetry = "1.40.0"
re2j = "1.8"
h2 = "2.3.232"

[libraries]
junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
flyway-core = { module = "org.flywaydb:flyway-core", version.ref = "flyway" }
flyway-mysql = { module = "org.flywaydb:flyway-mysql", version.ref = "flyway" }
flyway-core-boot2 = { module = "org.flywaydb:flyway-core", version.ref = "flyway-boot2" }
flyway-core-boot3 = { module = "org.flywaydb:flyway-core", version.ref = "flyway-boot3" }
flyway-mysql-boot3 = { module = "org.flywaydb:flyway-mysql", version.ref = "flyway-boot3" }
flyway-postgresql-boot3 = { module = "org.flywaydb:flyway-database-postgresql", version.ref = "flyway-boot3" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }
mysql-connector-j = { module = "com.mysql:mysql-connector-j", version.ref = "mysql" }
kingbase-jdbc = { module = "cn.com.kingbase:kingbase8", version.ref = "kingbase" }
jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
jackson-module-kotlin = { module = "com.fasterxml.jackson.module:jackson-module-kotlin", version.ref = "jackson-kotlin" }
spring-boot2-autoconfigure = { module = "org.springframework.boot:spring-boot-autoconfigure", version.ref = "spring-boot2" }
spring-boot2-configuration-processor = { module = "org.springframework.boot:spring-boot-configuration-processor", version.ref = "spring-boot2" }
spring-boot2-test = { module = "org.springframework.boot:spring-boot-test", version.ref = "spring-boot2" }
spring-boot2-starter-web = { module = "org.springframework.boot:spring-boot-starter-web", version.ref = "spring-boot2" }
spring-boot2-starter-jdbc = { module = "org.springframework.boot:spring-boot-starter-jdbc", version.ref = "spring-boot2" }
spring-boot2-starter-test = { module = "org.springframework.boot:spring-boot-starter-test", version.ref = "spring-boot2" }
spring-boot3-autoconfigure = { module = "org.springframework.boot:spring-boot-autoconfigure", version.ref = "spring-boot3" }
spring-boot3-configuration-processor = { module = "org.springframework.boot:spring-boot-configuration-processor", version.ref = "spring-boot3" }
spring-boot3-test = { module = "org.springframework.boot:spring-boot-test", version.ref = "spring-boot3" }
spring-boot3-starter-web = { module = "org.springframework.boot:spring-boot-starter-web", version.ref = "spring-boot3" }
spring-boot3-starter-jdbc = { module = "org.springframework.boot:spring-boot-starter-jdbc", version.ref = "spring-boot3" }
spring-boot3-starter-test = { module = "org.springframework.boot:spring-boot-starter-test", version.ref = "spring-boot3" }
assertj-core = { module = "org.assertj:assertj-core", version.ref = "assertj" }
aws-sdk-bom = { module = "software.amazon.awssdk:bom", version.ref = "aws-sdk" }
aws-sdk-s3 = { module = "software.amazon.awssdk:s3" }
aws-sdk-url-connection-client = { module = "software.amazon.awssdk:url-connection-client" }
micrometer-core = { module = "io.micrometer:micrometer-core", version.ref = "micrometer" }
opentelemetry-api = { module = "io.opentelemetry:opentelemetry-api", version.ref = "opentelemetry" }
opentelemetry-extension-kotlin = { module = "io.opentelemetry:opentelemetry-extension-kotlin", version.ref = "opentelemetry" }
opentelemetry-sdk = { module = "io.opentelemetry:opentelemetry-sdk", version.ref = "opentelemetry" }
opentelemetry-sdk-metrics = { module = "io.opentelemetry:opentelemetry-sdk-metrics", version.ref = "opentelemetry" }
opentelemetry-sdk-logs = { module = "io.opentelemetry:opentelemetry-sdk-logs", version.ref = "opentelemetry" }
opentelemetry-sdk-testing = { module = "io.opentelemetry:opentelemetry-sdk-testing", version.ref = "opentelemetry" }
re2j = { module = "com.google.re2j:re2j", version.ref = "re2j" }
h2 = { module = "com.h2database:h2", version.ref = "h2" }
slf4j-api = { module = "org.slf4j:slf4j-api", version = "1.7.36" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
