spring:
  config:
    activate:
      on-profile: platform
  application:
    name: fileweft-dev-platform
  datasource:
    url: ${FILEWEFT_PLATFORM_DB_URL:jdbc:postgresql://127.0.0.1:5432/fileweft?currentSchema=fileweft_dev_platform}
    username: ${FILEWEFT_PLATFORM_DB_USERNAME:fileweft}
    password: ${FILEWEFT_PLATFORM_DB_PASSWORD:fileweft-dev}
  flyway:
    enabled: false

server:
  port: ${FILEWEFT_PLATFORM_PORT:8081}

fileweft:
  dev:
    platform:
      # The production-like development receiver only downloads from this explicit internal service.
      allowed-download-hosts: ${FILEWEFT_DEV_PLATFORM_ALLOWED_DOWNLOAD_HOSTS:rustfs}
      max-download-bytes: ${FILEWEFT_DEV_PLATFORM_MAX_DOWNLOAD_BYTES:536870912}
