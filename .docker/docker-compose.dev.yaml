name: fw-dev

services:
  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    container_name: fw-dev-postgres
    environment:
      POSTGRES_DB: fileweft
      POSTGRES_USER: fileweft
      POSTGRES_PASSWORD: fileweft-dev
    ports:
      - "5432:5432"
    volumes:
      - fw-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileweft -d fileweft"]
      interval: 5s
      timeout: 3s
      retries: 12

  rustfs:
    image: rustfs/rustfs@sha256:fa19210ac4697c79d7ccca1ec9b0eb91aebacc6691991ffb14014bb3c67e6cc3
    container_name: fw-dev-rustfs
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: ChangeMe123!
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fw-dev-rustfs:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/health/live >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12

  fileweft-dev-platform:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.dev
    image: fileweft-dev:local
    pull_policy: never
    container_name: fw-dev-platform
    command: ["ai.icen.fw.dev.platform.DevPlatformApplicationKt", "--spring.profiles.active=platform"]
    environment:
      FILEWEFT_PLATFORM_DB_URL: jdbc:postgresql://postgres:5432/fileweft?currentSchema=fileweft_dev_platform
      FILEWEFT_PLATFORM_DB_USERNAME: fileweft
      FILEWEFT_PLATFORM_DB_PASSWORD: fileweft-dev
      FILEWEFT_DEV_PLATFORM_SHARED_SECRET: ${FILEWEFT_DEV_PLATFORM_SHARED_SECRET:?Set FILEWEFT_DEV_PLATFORM_SHARED_SECRET to a random value of at least 32 characters.}
      FILEWEFT_DEV_PLATFORM_ALLOWED_DOWNLOAD_HOSTS: ${FILEWEFT_DEV_PLATFORM_ALLOWED_DOWNLOAD_HOSTS:-rustfs}
      FILEWEFT_DEV_PLATFORM_MAX_DOWNLOAD_BYTES: ${FILEWEFT_DEV_PLATFORM_MAX_DOWNLOAD_BYTES:-536870912}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/platform/v1/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 18

  fileweft-dev-api:
    image: fileweft-dev:local
    pull_policy: never
    container_name: fw-dev-api
    command: ["ai.icen.fw.dev.FileWeftDevApplicationKt"]
    environment:
      FILEWEFT_DEV_DB_URL: jdbc:postgresql://postgres:5432/fileweft?currentSchema=fileweft_dev
      FILEWEFT_DEV_DB_USERNAME: fileweft
      FILEWEFT_DEV_DB_PASSWORD: fileweft-dev
      FILEWEFT_DEV_S3_ENDPOINT: http://rustfs:9000
      FILEWEFT_DEV_S3_REGION: us-east-1
      FILEWEFT_DEV_S3_ACCESS_KEY: rustfsadmin
      FILEWEFT_DEV_S3_SECRET_KEY: ChangeMe123!
      FILEWEFT_DEV_S3_BUCKET: fileweft-dev
      FILEWEFT_DEV_PLATFORM_URL: http://fileweft-dev-platform:8081/
      FILEWEFT_DEV_PLATFORM_SHARED_SECRET: ${FILEWEFT_DEV_PLATFORM_SHARED_SECRET:?Set FILEWEFT_DEV_PLATFORM_SHARED_SECRET to a random value of at least 32 characters.}
      FILEWEFT_PERSISTENCE_MIGRATION_MODE: MIGRATE
      FILEWEFT_PERSISTENCE_SCHEMA: fileweft_dev
      FILEWEFT_PERSISTENCE_CREATE_SCHEMA: "true"
      FILEWEFT_DEV_WORKER_ENABLED: "false"
      FILEWEFT_SYNC_CIRCUIT_BREAKER_OPEN_DURATION_MILLIS: ${FILEWEFT_DEV_CIRCUIT_BREAKER_OPEN_DURATION_MILLIS:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      fileweft-dev-platform:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 18

  fileweft-dev-worker:
    image: fileweft-dev:local
    pull_policy: never
    container_name: fw-dev-worker
    command: ["ai.icen.fw.dev.FileWeftDevApplicationKt", "--server.port=8082"]
    environment:
      FILEWEFT_DEV_DB_URL: jdbc:postgresql://postgres:5432/fileweft?currentSchema=fileweft_dev
      FILEWEFT_DEV_DB_USERNAME: fileweft
      FILEWEFT_DEV_DB_PASSWORD: fileweft-dev
      FILEWEFT_DEV_S3_ENDPOINT: http://rustfs:9000
      FILEWEFT_DEV_S3_REGION: us-east-1
      FILEWEFT_DEV_S3_ACCESS_KEY: rustfsadmin
      FILEWEFT_DEV_S3_SECRET_KEY: ChangeMe123!
      FILEWEFT_DEV_S3_BUCKET: fileweft-dev
      FILEWEFT_DEV_PLATFORM_URL: http://fileweft-dev-platform:8081/
      FILEWEFT_DEV_PLATFORM_SHARED_SECRET: ${FILEWEFT_DEV_PLATFORM_SHARED_SECRET:?Set FILEWEFT_DEV_PLATFORM_SHARED_SECRET to a random value of at least 32 characters.}
      FILEWEFT_PERSISTENCE_MIGRATION_MODE: VALIDATE
      FILEWEFT_PERSISTENCE_SCHEMA: fileweft_dev
      FILEWEFT_PERSISTENCE_CREATE_SCHEMA: "false"
      FILEWEFT_DEV_WORKER_ENABLED: "false"
      FILEWEFT_WORKER_ENABLED: "true"
      FILEWEFT_TASK_WORKER_ID: fw-dev-worker
      FILEWEFT_SYNC_CIRCUIT_BREAKER_OPEN_DURATION_MILLIS: ${FILEWEFT_DEV_CIRCUIT_BREAKER_OPEN_DURATION_MILLIS:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      fileweft-dev-platform:
        condition: service_healthy
      fileweft-dev-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/api/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 18

  fileweft-dev-web:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    container_name: fw-dev-web
    depends_on:
      fileweft-dev-api:
        condition: service_healthy
      fileweft-dev-platform:
        condition: service_healthy
    ports:
      - "8088:80"
    volumes:
      - ../fileweft-dev/web:/srv/fileweft-dev-web:ro
      - ../fileweft-docs:/srv/fileweft-docs:ro
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  fw-dev-postgres:
  fw-dev-rustfs:
