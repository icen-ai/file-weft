server {
    listen 80;
    server_name _;
    charset utf-8;
    # The UI permits resumable parts up to 512 MiB; keep the reverse proxy contract aligned.
    client_max_body_size 513m;
    root /usr/share/nginx/html;
    index index.html;

    # Docker can replace the API container without recreating this static UI
    # proxy. Resolve the service name per request window so Nginx never keeps
    # forwarding to the retired container IP after a development rebuild.
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 5s;
    set $fileweft_api http://fileweft-dev-api:8080;

    location /api/ {
        proxy_pass $fileweft_api;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Formal v1 routes share the same authenticated development API process.
    location /fileweft/ {
        # Preserve the runtime's normalized Content-Type on binary responses.
        charset off;
        proxy_pass $fileweft_api;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Downstream simulator credentials remain server-side; never proxy it into the browser origin.
    location ^~ /platform/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
