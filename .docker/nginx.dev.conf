server {
    listen 80;
    server_name _;
    charset utf-8;
    # The UI permits resumable parts up to 512 MiB; keep the reverse proxy contract aligned.
    client_max_body_size 513m;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://fileweft-dev-api:8080;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Downstream simulator credentials remain server-side; never proxy it into the browser origin.
    location ^~ /platform/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
