.fileweft-pr-jvm: &fileweft-pr-jvm
  runner: !reference [.fileweft-runner-4]
  docker: !reference [.fileweft-jvm-pr-docker]
  env: !reference [.fileweft-ci-env]
  breakIfModify: true
  lock:
    key: pr-$CNB_PULL_REQUEST_IID-$CNB_PIPELINE_KEY
    cancel-in-progress: true

.fileweft-pr-service: &fileweft-pr-service
  runner: !reference [.fileweft-runner-4]
  docker: !reference [.fileweft-jvm-pr-docker]
  services:
    - docker
  breakIfModify: true
  lock:
    key: pr-$CNB_PULL_REQUEST_IID-$CNB_PIPELINE_KEY
    cancel-in-progress: true

"**":
  pull_request:
    fast-check:
      <<: *fileweft-pr-jvm
      name: PR fast feedback
      ifModify: !reference [.fileweft-fast-paths]
      stages:
        - name: fast-check
          script: bash ./gradlew fastCheck --no-daemon --stacktrace

    docs:
      <<: *fileweft-pr-jvm
      name: PR documentation contract
      ifModify: !reference [.fileweft-docs-paths]
      stages:
        - name: docs-contract
          script: node --test flowweft-docs/test/site.test.mjs

    console:
      runner: !reference [.fileweft-runner-4]
      docker: !reference [.flowweft-console-pr-docker]
      env: !reference [.flowweft-console-env]
      breakIfModify: true
      lock:
        key: pr-$CNB_PULL_REQUEST_IID-$CNB_PIPELINE_KEY
        cancel-in-progress: true
      name: PR console contract
      ifModify: !reference [.flowweft-console-paths]
      stages:
        - name: install-console
          script: npm ci --prefix flowweft-console
        - name: verify-console
          script: npm run check --prefix flowweft-console

    console-redis:
      runner: !reference [.flowweft-runner-2]
      docker: !reference [.flowweft-console-redis-pr-docker]
      env: !reference [.flowweft-console-env]
      breakIfModify: true
      lock:
        key: pr-$CNB_PULL_REQUEST_IID-$CNB_PIPELINE_KEY
        cancel-in-progress: true
      name: PR Console Redis contract
      ifModify: !reference [.flowweft-console-redis-paths]
      stages:
        - name: install-console-redis-contract
          timeout: 5m
          script: npm ci --prefix flowweft-console
        - name: verify-console-redis-contract
          timeout: 2m
          script: sh .ci/scripts/run-console-redis-contract.sh

    artifacts:
      runner: !reference [.fileweft-runner-8]
      docker: !reference [.fileweft-jvm-pr-docker]
      env: !reference [.fileweft-ci-env]
      breakIfModify: true
      lock:
        key: pr-$CNB_PULL_REQUEST_IID-$CNB_PIPELINE_KEY
        cancel-in-progress: true
      name: PR release artifact contract
      ifModify: !reference [.fileweft-release-artifact-paths]
      stages:
        - name: release-artifacts
          script: bash ./gradlew releaseArtifactCheck --no-daemon --no-configuration-cache --stacktrace

    minimum-java8:
      <<: *fileweft-pr-jvm
      name: PR Java 8 minimum runtime
      ifModify: !reference [.fileweft-jvm8-paths]
      stages:
        - name: java-8-compatibility
          script: bash ./gradlew compatibilityJava8Check --no-daemon --stacktrace

    minimum-java17:
      <<: *fileweft-pr-jvm
      name: PR Java 17 minimum runtime
      ifModify: !reference [.fileweft-jvm17-paths]
      stages:
        - name: java-17-compatibility
          script: bash ./gradlew compatibilityJava17Check --no-daemon --stacktrace

    postgres:
      <<: *fileweft-pr-service
      name: PR PostgreSQL integration
      env: !reference [.fileweft-postgres-env]
      ifModify: !reference [.fileweft-postgres-paths]
      stages:
        - name: start-postgres
          script: docker compose -f .docker/docker-compose.dev.yaml up --detach --wait postgres
        - name: postgres-integration
          script: bash ./gradlew postgresIntegrationCheck --no-daemon --no-configuration-cache --stacktrace
      endStages:
        - name: stop-postgres
          script: docker compose -f .docker/docker-compose.dev.yaml down --volumes --remove-orphans || true

    mysql:
      <<: *fileweft-pr-service
      name: PR MySQL 8 integration
      env: !reference [.fileweft-mysql-env]
      ifModify: !reference [.fileweft-mysql-paths]
      stages:
        - name: start-mysql
          script: docker compose -f .docker/docker-compose.dev.yaml up --detach --wait mysql
        - name: mysql-integration
          script: bash ./gradlew mysqlIntegrationCheck --no-daemon --no-configuration-cache --stacktrace
      endStages:
        - name: stop-mysql
          script: docker compose -f .docker/docker-compose.dev.yaml down --volumes --remove-orphans || true

    kingbase:
      <<: *fileweft-pr-service
      name: PR KingbaseES V8 integration
      env: !reference [.fileweft-kingbase-env]
      ifModify: !reference [.fileweft-kingbase-paths]
      stages:
        - name: load-verified-kingbase-image
          script: bash .ci/scripts/prepare-kingbase-image.sh
        - name: start-kingbase
          script: docker compose -f .docker/docker-compose.dev.yaml up --detach --wait kingbase
        - name: kingbase-integration
          script: bash ./gradlew kingbaseIntegrationCheck --no-daemon --no-configuration-cache --stacktrace
      endStages:
        - name: stop-kingbase
          script: docker compose -f .docker/docker-compose.dev.yaml down --volumes --remove-orphans || true

    rustfs:
      <<: *fileweft-pr-service
      name: PR RustFS integration
      env: !reference [.fileweft-rustfs-env]
      ifModify: !reference [.fileweft-rustfs-paths]
      stages:
        - name: start-rustfs
          script: docker compose -f .docker/docker-compose.dev.yaml up --detach --wait rustfs
        - name: rustfs-integration
          script: bash ./gradlew rustFsIntegrationCheck --no-daemon --no-configuration-cache --stacktrace
      endStages:
        - name: stop-rustfs
          script: docker compose -f .docker/docker-compose.dev.yaml down --volumes --remove-orphans || true

    acceptance:
      runner: !reference [.fileweft-runner-8]
      docker: !reference [.fileweft-e2e-pr-docker]
      services:
        - docker
      env: !reference [.fileweft-e2e-env]
      breakIfModify: true
      lock:
        key: pr-$CNB_PULL_REQUEST_IID-$CNB_PIPELINE_KEY
        cancel-in-progress: true
      name: PR API and browser acceptance
      ifModify: !reference [.fileweft-e2e-paths]
      stages:
        - name: install-browser-tests
          script: npm ci --prefix fileweft-dev/web
        - name: start-compose
          script: docker compose -f .docker/docker-compose.dev.yaml up --detach --build --wait
        - name: api-then-browser-acceptance
          script: bash ./gradlew devAcceptanceCheck --no-daemon --no-configuration-cache --stacktrace
      endStages:
        - name: collect-compose-state
          script: docker compose -f .docker/docker-compose.dev.yaml ps || true
        - name: stop-compose
          script: docker compose -f .docker/docker-compose.dev.yaml down --volumes --remove-orphans || true
