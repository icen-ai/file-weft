.fileweft-runner-4:
  tags: cnb:arch:amd64
  cpus: 4

.fileweft-runner-8:
  tags: cnb:arch:amd64
  cpus: 8

.fileweft-jvm-pr-docker:
  build:
    dockerfile: .ci/Dockerfile.jvm
    by:
      - .ci/Dockerfile.jvm
    versionBy:
      - .ci/Dockerfile.jvm
  volumes:
    - main:/root/.gradle:copy-on-write-read-only

.fileweft-jvm-docker:
  build:
    dockerfile: .ci/Dockerfile.jvm
    by:
      - .ci/Dockerfile.jvm
    versionBy:
      - .ci/Dockerfile.jvm
  volumes:
    - main:/root/.gradle:copy-on-write

.fileweft-e2e-pr-docker:
  build:
    dockerfile: .ci/Dockerfile.e2e
    by:
      - .ci/Dockerfile.e2e
    versionBy:
      - fileweft-dev/web/package-lock.json
  volumes:
    - main:/root/.gradle:copy-on-write-read-only
    - main:/root/.npm:copy-on-write-read-only

.fileweft-e2e-docker:
  build:
    dockerfile: .ci/Dockerfile.e2e
    by:
      - .ci/Dockerfile.e2e
    versionBy:
      - fileweft-dev/web/package-lock.json
  volumes:
    - main:/root/.gradle:copy-on-write
    - main:/root/.npm:copy-on-write

.fileweft-ci-env:
  CI: "true"
  FILEWEFT_TEST_MAX_PARALLEL_TASKS: "2"

.fileweft-postgres-env:
  CI: "true"
  FILEWEFT_TEST_MAX_PARALLEL_TASKS: "2"
  FILEWEFT_RUN_POSTGRES_TESTS: "true"
  FILEWEFT_DEV_PLATFORM_SHARED_SECRET: fileweft-ci-only-shared-secret-2026

.fileweft-mysql-env:
  CI: "true"
  FILEWEFT_TEST_MAX_PARALLEL_TASKS: "2"
  FILEWEFT_RUN_MYSQL_TESTS: "true"
  FILEWEFT_DEV_PLATFORM_SHARED_SECRET: fileweft-ci-only-shared-secret-2026
  FILEWEFT_MYSQL_DATABASE: fileweft
  FILEWEFT_MYSQL_ADMIN_URL: "jdbc:mysql://127.0.0.1:3306?useSSL=false&allowPublicKeyRetrieval=true"
  FILEWEFT_MYSQL_ADMIN_USER: root
  FILEWEFT_MYSQL_ADMIN_PASSWORD: fileweft-dev
  FILEWEFT_MYSQL_URL: "jdbc:mysql://127.0.0.1:3306/fileweft?useSSL=false&allowPublicKeyRetrieval=true"
  FILEWEFT_MYSQL_USER: root
  FILEWEFT_MYSQL_PASSWORD: fileweft-dev

.fileweft-kingbase-env:
  CI: "true"
  FILEWEFT_TEST_MAX_PARALLEL_TASKS: "2"
  FILEWEFT_RUN_KINGBASE_TESTS: "true"
  FILEWEFT_DEV_PLATFORM_SHARED_SECRET: fileweft-ci-only-shared-secret-2026
  FILEWEFT_KINGBASE_URL: "jdbc:kingbase8://127.0.0.1:54321/test"
  FILEWEFT_KINGBASE_USER: system
  FILEWEFT_KINGBASE_PASSWORD: kingbase
  FILEWEFT_KINGBASE_SCHEMA: public

.fileweft-rustfs-env:
  CI: "true"
  FILEWEFT_TEST_MAX_PARALLEL_TASKS: "2"
  FILEWEFT_RUN_RUSTFS_TESTS: "true"
  FILEWEFT_DEV_PLATFORM_SHARED_SECRET: fileweft-ci-only-shared-secret-2026

.fileweft-e2e-env:
  CI: "true"
  FILEWEFT_TEST_MAX_PARALLEL_TASKS: "2"
  FILEWEFT_RUN_DEV_E2E: "true"
  FILEWEFT_RUN_DEV_UI_E2E: "true"
  FILEWEFT_DEV_PLATFORM_SHARED_SECRET: fileweft-ci-only-shared-secret-2026

